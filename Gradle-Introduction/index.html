일이나 테스트 커버리지 리포트 등을 생성한다.\u003c/p\u003e\n\u003ch3 id=\"왜-gradle인가-maven과의-비교\"\u003e\u003ca href=\"#왜-gradle인가-maven과의-비교\"\u003e왜 Gradle인가? (Maven과의 비교)\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle이 등장하기 전에는 Maven이 Java 생태계의 대표적인 빌드 도구였다. Maven은 XML 기반의 POM(Project Object Model) 파일을 사용하여 빌드를 정의하는데, 프로젝트 규모가\n커질수록 XML이 장황해지고 커스터마이징이 어려워지는 단점이 있다. Gradle은 이러한 한계를 극복하기 위해 설계되었으며, 주요 차이점은 다음과 같다.\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003eMaven\u003c/th\u003e\n\u003cth\u003eGradle\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e빌드 스크립트\u003c/td\u003e\n\u003ctd\u003eXML (\u003ccode\u003epom.xml\u003c/code\u003e)\u003c/td\u003e\n\u003ctd\u003eGroovy/Kotlin DSL (\u003ccode\u003ebuild.gradle\u003c/code\u003e, \u003ccode\u003ebuild.gradle.kts\u003c/code\u003e)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e유연성\u003c/td\u003e\n\u003ctd\u003e컨벤션 기반, 커스터마이징 제한적\u003c/td\u003e\n\u003ctd\u003e프로그래밍 언어 기반, 높은 유연성\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e성능\u003c/td\u003e\n\u003ctd\u003e증분 빌드 미지원\u003c/td\u003e\n\u003ctd\u003e증분 빌드 + 빌드 캐시 + 데몬\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e의존성 관리\u003c/td\u003e\n\u003ctd\u003e잘 갖추어져 있음\u003c/td\u003e\n\u003ctd\u003eMaven 리포지토리 호환 + 더 세밀한 설정 가능\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e멀티 프로젝트\u003c/td\u003e\n\u003ctd\u003e지원하나 설정이 복잡\u003c/td\u003e\n\u003ctd\u003e유연하고 간결한 멀티 프로젝트 구성\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eGradle 공식 벤치마크에 따르면 거의 모든 시나리오에서 Maven보다 최소 2배 이상 빠르며, 빌드 캐시를 활용할 경우 최대 100배까지 빠를 수 있다.\u003c/p\u003e\n\u003ch3 id=\"선언적-빌드-스크립트\"\u003e\u003ca href=\"#선언적-빌드-스크립트\"\u003e선언적 빌드 스크립트\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 빌드 프로세스의 단계를 정의하기 위해 Groovy 또는 Kotlin으로 작성된 빌드 스크립트를 사용한다. 이 스크립트들은 소프트웨어 빌드 및 배포에 필요한 태스크(Tasks)를 명시한다. Gradle의\n선언적 언어는 태스크와 의존성을 쉽게 기술할 수 있게 해주어, '어떻게(How)'보다는 '무엇을(What)' 달성하고자 하는지에 집중할 수 있게 한다. 또한, 빌드 프로세스와 구성을 기술하기 위해 특별히 맞춤화된\n언어인 DSL(Domain-Specific Language)을 사용한다.\u003c/p\u003e\n\u003ch3 id=\"groovy-dsl\"\u003e\u003ca href=\"#groovy-dsl\"\u003eGroovy DSL\u003c/a\u003e\u003c/h3\u003e\n\u003cpre class=\"language-groovy\"\u003e\u003ccode class=\"language-groovy code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003eplugins \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    id \u003cspan class=\"token string\"\u003e'java'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    id \u003cspan class=\"token string\"\u003e'org.springframework.boot'\u003c/span\u003e version \u003cspan class=\"token string\"\u003e'3.2.0'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003egroup \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token string\"\u003e'com.example'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003eversion \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token string\"\u003e'0.0.1-SNAPSHOT'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"8\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"9\"\u003erepositories \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"10\"\u003e    \u003cspan class=\"token function\"\u003emavenCentral\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"11\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"12\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"13\"\u003edependencies \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"14\"\u003e    implementation \u003cspan class=\"token string\"\u003e'org.springframework.boot:spring-boot-starter-web'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"15\"\u003e    testImplementation \u003cspan class=\"token string\"\u003e'org.springframework.boot:spring-boot-starter-test'\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"16\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"17\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"18\"\u003etest \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"19\"\u003e    \u003cspan class=\"token function\"\u003euseJUnitPlatform\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"20\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGroovy DSL은 Gradle이 제공하는 원조 DSL로, Groovy 언어로 작성된다. 대부분의 기존 Gradle 빌드 스크립트는 Groovy 문법과 규칙을 따른다. Groovy DSL 스크립트는\n\u003ccode\u003ebuild.gradle\u003c/code\u003e이라는 파일명으로 정의된다. Groovy는 문법이 간결하여 빌드 구성을 읽기 쉬운 형식으로 표현하기 좋다.\u003c/p\u003e\n\u003ch3 id=\"kotlin-dsl\"\u003e\u003ca href=\"#kotlin-dsl\"\u003eKotlin DSL\u003c/a\u003e\u003c/h3\u003e\n\u003cpre class=\"language-kotlin\"\u003e\u003ccode class=\"language-kotlin code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003eplugins \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token function\"\u003eid\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"java\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    \u003cspan class=\"token function\"\u003eid\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"org.springframework.boot\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e version \u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"3.2.0\"\u003c/span\u003e\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003egroup \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"com.example\"\u003c/span\u003e\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003eversion \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"0.0.1-SNAPSHOT\"\u003c/span\u003e\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"8\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"9\"\u003erepositories \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"10\"\u003e    \u003cspan class=\"token function\"\u003emavenCentral\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"11\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"12\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"13\"\u003edependencies \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"14\"\u003e    \u003cspan class=\"token function\"\u003eimplementation\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"org.springframework.boot:spring-boot-starter-web\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"15\"\u003e    \u003cspan class=\"token function\"\u003etestImplementation\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"org.springframework.boot:spring-boot-starter-test\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"16\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"17\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"18\"\u003etasks\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token function\"\u003etest\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"19\"\u003e    \u003cspan class=\"token function\"\u003euseJUnitPlatform\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"20\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGradle은 Kotlin을 스크립팅 언어로 사용하는 Kotlin 기반 DSL도 지원한다. Kotlin DSL 스크립트는 \u003ccode\u003ebuild.gradle.kts\u003c/code\u003e라는 파일명으로 정의된다. Groovy와 유사하지만 문법적으로\n차이가 있다.\u003c/p\u003e\n\u003ch3 id=\"groovy-dsl-vs-kotlin-dsl\"\u003e\u003ca href=\"#groovy-dsl-vs-kotlin-dsl\"\u003eGroovy DSL vs Kotlin DSL\u003c/a\u003e\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003e항목\u003c/th\u003e\n\u003cth\u003eGroovy DSL\u003c/th\u003e\n\u003cth\u003eKotlin DSL\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e파일명\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ebuild.gradle\u003c/code\u003e\u003c/td\u003e\n\u003ctd\u003e\u003ccode\u003ebuild.gradle.kts\u003c/code\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e문자열\u003c/td\u003e\n\u003ctd\u003e작은따옴표(\u003ccode\u003e'...'\u003c/code\u003e) 및 큰따옴표 모두 사용\u003c/td\u003e\n\u003ctd\u003e큰따옴표(\u003ccode\u003e\"...\"\u003c/code\u003e)만 사용\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e함수 호출\u003c/td\u003e\n\u003ctd\u003e괄호 생략 가능 (\u003ccode\u003eid 'java'\u003c/code\u003e)\u003c/td\u003e\n\u003ctd\u003e괄호 필수 (\u003ccode\u003eid(\"java\")\u003c/code\u003e)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e타입 안전성\u003c/td\u003e\n\u003ctd\u003e동적 타입\u003c/td\u003e\n\u003ctd\u003e정적 타입, 컴파일 타임 검증\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eIDE 지원\u003c/td\u003e\n\u003ctd\u003e자동 완성 제한적\u003c/td\u003e\n\u003ctd\u003e강력한 자동 완성 및 리팩토링 지원\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e최근에는 Kotlin DSL이 공식 권장되는 추세이며, 타입 안전성과 IDE 자동 완성 덕분에 빌드 스크립트의 생산성과 유지보수성이 향상된다.\u003c/p\u003e\n\u003ch3 id=\"의존성-관리\"\u003e\u003ca href=\"#의존성-관리\"\u003e의존성 관리\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 Maven Central 및 JCenter와 같은 리포지토리와 통합되어 외부 라이브러리(의존성)를 지정하고 버전을 관리할 수 있게 해준다. 이렇게 함으로써 의존성을 자동으로 해결(resolve)하고\n로컬에 캐시(cache)하여 빌드 성능과 신뢰성을 향상시킨다.\u003c/p\u003e\n\u003ch3 id=\"증분-빌드\"\u003e\u003ca href=\"#증분-빌드\"\u003e증분 빌드\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 마지막 빌드 이후 변경된 태스크만 실행하는 '증분 빌드(Incremental Build)'를 수행한다. 이 기능은 특히 대규모 프로젝트에서 빌드 프로세스 속도를 크게 높여준다. 체크섬(\nchecksums)과 타임스탬프를 사용하여 특정 태스크를 다시 실행해야 하는지 여부를 판단하여, 체크섬이 다르면 실행을 다시 하여 빌드하고 아니면 그대로 둔다.\u003c/p\u003e\n\u003ch3 id=\"빌드-캐시\"\u003e\u003ca href=\"#빌드-캐시\"\u003e빌드 캐시\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e증분 빌드와 함께 알아두면 좋은 개념이 빌드 캐시(Build Cache)이다. 증분 빌드가 \"마지막 빌드 이후 변경된 태스크만 다시 실행\"하는 것이라면, 빌드 캐시는 \"과거에 동일한 입력으로 실행된 태스크의 결과물을\n저장해두고 재사용\"하는 메커니즘이다.\u003c/p\u003e\n\u003cp\u003e예를 들어, \u003ccode\u003efeature-A\u003c/code\u003e 브랜치에서 작업하다가 \u003ccode\u003emain\u003c/code\u003e 브랜치로 전환한 뒤 다시 \u003ccode\u003efeature-A\u003c/code\u003e로 돌아오는 상황을 생각해보면, 증분 빌드만으로는 변경이 감지되어 태스크를 다시 실행하지만, 빌드\n캐시가 있다면 이전에 동일한 입력으로 이미 빌드한 결과를 캐시에서 가져와 빌드 시간을 크게 단축할 수 있다.\u003c/p\u003e\n\u003cp\u003e빌드 캐시는 로컬 캐시와 리모트 캐시로 나뉘며, 리모트 캐시를 설정하면 팀원 간에 빌드 결과를 공유하여 CI/CD 환경에서도 빌드 속도를 향상시킬 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token comment\"\u003e# 빌드 캐시 활성화\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003egradle build --build-cache\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e또는 \u003ccode\u003egradle.properties\u003c/code\u003e에 아래와 같이 설정하여 항상 활성화할 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-properties\"\u003e\u003ccode class=\"language-properties code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token key attr-name\"\u003eorg.gradle.caching\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e=\u003c/span\u003e\u003cspan class=\"token value attr-value\"\u003etrue\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 id=\"gradle-daemon\"\u003e\u003ca href=\"#gradle-daemon\"\u003eGradle Daemon\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 빌드 성능을 위해 데몬(Daemon) 프로세스를 사용한다. Gradle Daemon은 백그라운드에서 상주하는 장수(long-lived) 프로세스로, 빌드가 요청될 때마다 JVM을 새로 기동하지 않고\n이미 실행 중인 데몬이 빌드를 처리한다.\u003c/p\u003e\n\u003cp\u003eJVM 기동 시 클래스 로딩과 JIT 컴파일에 상당한 시간이 소요되는데, 데몬을 활용하면 이 오버헤드를 제거하여 첫 번째 빌드 이후의 빌드 속도가 크게 향상된다. Gradle 3.0부터 데몬은 기본적으로 활성화되어\n있다.\u003c/p\u003e\n\u003ch3 id=\"멀티-프로젝트-빌드\"\u003e\u003ca href=\"#멀티-프로젝트-빌드\"\u003e멀티 프로젝트 빌드\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 여러 하위 프로젝트(subprojects)나 모듈이 있는 복잡한 프로젝트를 처리할 수 있다. 각 하위 프로젝트는 고유한 의존성과 태스크를 가질 수 있지만, 하나의 단일 빌드 스크립트의 일부로서 함께\n빌드될 수 있다. 이는 대규모 애플리케이션, 마이크로서비스 또는 모듈러 아키텍처를 가진 소프트웨어에 특히 유용하다.\u003c/p\u003e\n\u003ch3 id=\"사용자-정의-및-확장-가능성\"\u003e\u003ca href=\"#사용자-정의-및-확장-가능성\"\u003e사용자 정의 및 확장 가능성\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 풍부한 API와 플러그인 시스템을 제공하여 태스크를 커스터마이징하거나 자신만의 플러그인을 만들 수 있다. Java 코드 컴파일, 테스트 실행, JAR 파일 패키징 등 일반적인 작업을 위한 플러그인들이\n이미 제공된다. Gradle의 유연성 덕분에 안드로이드 앱부터 웹 애플리케이션까지 광범위한 프로젝트 유형을 지원할 수 있다.\u003c/p\u003e\n\u003ch3 id=\"빌드-스캔\"\u003e\u003ca href=\"#빌드-스캔\"\u003e빌드 스캔\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e빌드 스캔은 빌드에 대한 상세한 인사이트를 제공하는 기능이다. 빌드 성능, 의존성, 태스크 실행 시간 등에 대한 정보를 포함하여 빌드 프로세스를 최적화하는 데 도움을 준다. 이 스캔 결과는 다른 사람과 공유할 수\n있어, 팀 환경에서 문제를 진단하기가 더 쉬워진다.\u003c/p\u003e\n\u003ch3 id=\"지속적-통합-및-배포-cicd\"\u003e\u003ca href=\"#지속적-통합-및-배포-cicd\"\u003e지속적 통합 및 배포 (CI/CD)\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGradle은 Jenkins, CircleCI, Travis CI와 같은 도구를 사용하여 CI/CD 파이프라인에 쉽게 통합될 수 있다. 헤드리스(headless, GUI 없이) 방식으로 태스크를 실행할 수 있는 능력\n덕분에 자동화된 빌드, 테스트 및 배포에 매우 적합하다.\u003c/p\u003e\n\u003ch3 id=\"설치\"\u003e\u003ca href=\"#설치\"\u003e설치\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e설치는 매우 간단하다. 맥 기준으로 아래와 같이 homebrew를 이용하면 쉽다.\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003ebrew \u003cspan class=\"token function\"\u003einstall\u003c/span\u003e gradle\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Gradle-Introduction/assets/01.png\" loading=\"lazy\" decoding=\"async\" alt=\"image01\"\u003e\u003c/p\u003e\n\u003ch3 id=\"gradle-wrapper\"\u003e\u003ca href=\"#gradle-wrapper\"\u003eGradle Wrapper\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e실무에서는 \u003ccode\u003ebrew install gradle\u003c/code\u003e로 시스템에 직접 설치하기보다 Gradle Wrapper를 사용하는 것이 권장된다. Gradle Wrapper는 프로젝트에 포함되는 스크립트(\u003ccode\u003egradlew\u003c/code\u003e,\n\u003ccode\u003egradlew.bat\u003c/code\u003e)와 설정 파일로, 프로젝트에서 사용할 Gradle 버전을 고정하고 자동으로 다운로드해준다.\u003c/p\u003e\n\u003cp\u003eWrapper를 사용하면 팀원 모두가 동일한 Gradle 버전으로 빌드하게 되어 \"내 환경에서는 되는데?\"와 같은 문제를 방지할 수 있고, CI/CD 서버에 별도로 Gradle을 설치할 필요가 없다.\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token comment\"\u003e# Wrapper 생성\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003egradle wrapper --gradle-version \u003cspan class=\"token number\"\u003e8.5\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token comment\"\u003e# Wrapper를 통한 빌드 (시스템에 Gradle이 설치되어 있지 않아도 동작)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e./gradlew build\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eWrapper를 실행하면 프로젝트 루트에 다음과 같은 파일들이 생성된다.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e├── gradle\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e│   └── wrapper\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e│       ├── gradle-wrapper.jar\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e│       └── gradle-wrapper.properties\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e├── gradlew\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e└── gradlew.bat\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003ccode\u003egradle-wrapper.properties\u003c/code\u003e 파일에서 Gradle 버전을 확인하고 변경할 수 있다. 이 파일들은 버전 관리 시스템(Git 등)에 함께 커밋하여 팀 전체가 동일한 환경에서 빌드할 수 있도록 한다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"[Gradle] Introduction\",\"date\":\"Sun Mar 29 2026 13:24:27 GMT+0000 (Coordinated Universal Time)\",\"tags\":\"$0:f:0:1:1:props:children:1:props:children:1:props:children:0:props:posts:14:tags\",\"image\":\"/content/posts/Gradle-Introduction/assets/banner.png\",\"series\":\"gradle\",\"timeToRead\":6,\"html\":\"$1a\"},\"author\":\"Sungbin\",\"seriesPosts\":[{\"name\":\"[Gradle] Introduction\",\"timeToRead\":6,\"slug\":\"/Gradle-Introduction/\"},{\"name\":\"[Gradle] 기본\",\"timeToRead\":24,\"slug\":\"/Gradle-기본/\"},{\"name\":\"[Gradle] Groovy 언어의 기본\",\"timeToRead\":28,\"slug\":\"/Gradle-Groovy-언어의-기본/\"},{\"name\":\

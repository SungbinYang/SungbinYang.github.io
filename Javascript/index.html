003e지금부터 자바스크립트 문법에 대해 알아보도록 하겠다. 자바스크립트 문법에 앞서서 실습 환경은 개발자 도구를 통해서 알아보도록 하겠다. 여기서는 단순히 코드만 보여주겠지만 직접 실습을 해보면 좋을 것 같다.\u003c/p\u003e\n\u003ch3 id=\"변수와-상수\"\u003e\u003ca href=\"#변수와-상수\"\u003e변수와 상수\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e자바에서는 변수와 상수를 정의할 때 타입과 함께 정의를 하였지만 자바스크립트는 타입을 안 적어줘도 괜찮다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e a \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위와 같이 정의를 하면 변수 a에 1을 대입한 것과 같다. 그러면 이제 정수가 아닌 문자열 변수를 정의해보자.  문자열 변수를 정의하는 방법은 아래와 같다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e b \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"자바스크립트\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그러면 여러분이 위의 실습을 통해 변수를 정의하고 엔터를 치면 아래와 같이 \u003ccode\u003eundefined\u003c/code\u003e라고 나오는 것을 확인 했을 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/01.png\" loading=\"lazy\" decoding=\"async\" alt=\"image01\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 개발자 도구 창에 \u003ccode\u003e3 + 5\u003c/code\u003e라고 작성해보자. 그러면 아마 아래와 같이 숫자 8이 나오는 것을 볼 수 있을 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/02.png\" loading=\"lazy\" decoding=\"async\" alt=\"image02\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 이 숫자 8과 \u003ccode\u003eundefined\u003c/code\u003e의 차이를 좀 알아보자. 개발자 도구에서 엔터를 쳤을 때 나오는 이 값은 해당 명령문에 대한 반환값을 의미하는 것이다. 즉, 3과 5를 더했을 때 숫자 8이 나오는 반환 값이 존재하므로 개발자 도구에 숫자 8이 나오는 것이고 변수에 값을 할당에서 정의하는 행위는 반환값이 없으므로 \u003ccode\u003eundefined\u003c/code\u003e라고 나오는 것이다. 잠시 후에 알아 볼 함수를 정의하는 것도 반환값이 없다면 \u003ccode\u003eundefined\u003c/code\u003e라고 나올 것이고 결과 값이 없다면 그 값이 개발자 도구창에 나올 것이다.\u003c/p\u003e\n\u003cp\u003e그러면 여기서 1가지 의문이 들 것이다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e자바처럼 변수 할당하는 것은 비슷한데 자바스크립트는 타입이 없나요?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e위의 물음에 일반적으로 타입이 없다라고 말씀하시는 분들도 계시지만 필자의 생각으로는 자바스크립트에도 타입은 존재한다라고 말할 수 있을 것이다. 그 이유는 바로 \u003ccode\u003etypeof\u003c/code\u003e라는 키워드 때문이다. 위의 선언된 변수에 대해서 실습을 해보도록 하겠다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003etypeof\u003c/span\u003e a\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// number\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\u003cspan class=\"token keyword\"\u003etypeof\u003c/span\u003e b\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// string\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이런 이유로 자바스크립트에도 여전히 타입은 존재하고 그 타입을 알려면 \u003ccode\u003etypeof\u003c/code\u003e라는 키워드를 통해 알아야 한다.\u003c/p\u003e\n\u003cp\u003e다음으로 상수에 대해 알아보자. 자바에서 상수를 선언할 때는 \u003ccode\u003efinal\u003c/code\u003e 키워드를 통해서 상수를 선언하였는데 자바스크립트에서는 \u003ccode\u003econst\u003c/code\u003e라는 키워드를 사용한다. 상수 변수 네이밍 규칙은 자바와 동일하다. 그러면 한번 상수를 정의해보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e \u003cspan class=\"token constant\"\u003ePI\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e3.14\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그리고 자바스크립트도 자바처럼 상수에 값을 변경하려고 하면 안된다. 만약 변경하려고 한다면 아래와 같은 에러가 발생할 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/03.png\" loading=\"lazy\" decoding=\"async\" alt=\"image03\"\u003e\u003c/p\u003e\n\u003ch3 id=\"로그\"\u003e\u003ca href=\"#로그\"\u003e로그\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e자바스크립트도 자바처럼 로그를 찍을 수 있다. 자바에서는 lombok의 \u003ccode\u003elog\u003c/code\u003e나 \u003ccode\u003eSystem.out.println\u003c/code\u003e을 통하여 로그 출력문을 작성할 수 있었지만 자바스크립트는 아래처럼 \u003ccode\u003econsole.log\u003c/code\u003e를 통해 로그를 찍을 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'Hello World!'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e혹은 변수에 있는 값을 출력하고 싶다면 아래와 같이 해주면 된다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e a \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e3\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003ea\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// 숫자 3 출력\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그런데 독자들이 실습을 하면서 1가지 의문사항이 생길 수도 있다. 위와 같이 실습을 하면 아래와 같은 화면처럼 값이 출력 되고 \u003ccode\u003eundefined\u003c/code\u003e라고 찍히는 것도 볼 수 있을 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/04.png\" loading=\"lazy\" decoding=\"async\" alt=\"image04\"\u003e\u003c/p\u003e\n\u003cp\u003e숫자 3은 \u003ccode\u003econsole.log\u003c/code\u003e를 통해 나온 실행 결과물로 보면 좋을 것이고 \u003ccode\u003eundefined\u003c/code\u003e는 \u003ccode\u003econsole.log\u003c/code\u003e에 대한 반환 값을 의미하는 것이다.\u003c/p\u003e\n\u003ch3 id=\"alert\"\u003e\u003ca href=\"#alert\"\u003ealert\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로는 \u003ccode\u003ealert\u003c/code\u003e에 대한 것에 대해서도 알아보겠다. \u003ccode\u003ealert\u003c/code\u003e에는 브라우저 창에 알림창을 띄워주는 기능을 한다. 이것을 변수와 조합해서 사용할 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e \u003cspan class=\"token constant\"\u003ePI\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e3.14\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\u003cspan class=\"token function\"\u003ealert\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'PI = '\u003c/span\u003e \u003cspan class=\"token operator\"\u003e+\u003c/span\u003e \u003cspan class=\"token constant\"\u003ePI\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위와 같이 작성하여 실행을 하면 아래와 같은 결과처럼 브라우저에서 기본으로 제공해주는 알림창이 나올 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/05.png\" loading=\"lazy\" decoding=\"async\" alt=\"image05\"\u003e\u003c/p\u003e\n\u003ch3 id=\"논리-연산자\"\u003e\u003ca href=\"#논리-연산자\"\u003e논리 연산자\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로 논리 연산자에 대해 알아보자. 자바스크립트도 자바처럼 논리 연산자를 가지고 있다. 단 차이가 있다면 등호 연산자에서 \u003ccode\u003e==\u003c/code\u003e를 쓰냐 \u003ccode\u003e===\u003c/code\u003e를 쓰냐 차이가 존재한다. 자바스크립트에서는 등호 연산자로 \u003ccode\u003e==\u003c/code\u003e과 \u003ccode\u003e===\u003c/code\u003e를 제공하는데 \u003ccode\u003e===\u003c/code\u003e을 쓸 경우 타입까지 같은지 체크를 해준다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/06.png\" loading=\"lazy\" decoding=\"async\" alt=\"image06\"\u003e\u003c/p\u003e\n\u003cp\u003e만약 서로 다른 타입으로 \u003ccode\u003e===\u003c/code\u003e 비교를 진행하였다면 아래처럼 \u003ccode\u003efalse\u003c/code\u003e를 반환할 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/07.png\" loading=\"lazy\" decoding=\"async\" alt=\"image07\"\u003e\u003c/p\u003e\n\u003cp\u003e그런데 만약 서로 다른 타입이라고 하더라고 값이 논리상 같아 보인다면 \u003ccode\u003e==\u003c/code\u003e를 쓰면 \u003ccode\u003etrue\u003c/code\u003e가 나온다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/08.png\" loading=\"lazy\" decoding=\"async\" alt=\"image08\"\u003e\u003c/p\u003e\n\u003cp\u003e여기서 우리가 원하는 것은 자바처럼 타입이 다르면 다르다라고 \u003ccode\u003efalse\u003c/code\u003e를 반환하기를 원할 것이다. 그래서 우리는 자바스크립트를 작성해서 비교 연산을 진행하려면 \u003ccode\u003e==\u003c/code\u003e보다는 \u003ccode\u003e===\u003c/code\u003e을 사용하는 것을 추천한다.\u003c/p\u003e\n\u003cp\u003e만약 다름을 비교하려면 \u003ccode\u003e!==\u003c/code\u003e를 사용하면 된다. 해당 연산자는 타입까지 체크를 해준다. 만약 값만 같은지 다른지 여부를 보려면 \u003ccode\u003e!=\u003c/code\u003e를 해주면 된다.\u003c/p\u003e\n\u003ch3 id=\"조건문\"\u003e\u003ca href=\"#조건문\"\u003e조건문\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e자바스크립트에서도 자바와 같이 조건문을 제공해준다. 그러면 바로 실습을 해보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e a \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\u003cspan class=\"token keyword control-flow\"\u003eif\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003ea \u003cspan class=\"token operator\"\u003e===\u003c/span\u003e \u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'number는 1입니다.'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e \u003cspan class=\"token keyword control-flow\"\u003eelse\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'number는 1이 아닙니다.'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e간단한 내용이니 여기서 조건문은 여기서 마무리해보도록 하겠다.\u003c/p\u003e\n\u003ch3 id=\"배열과-반복문\"\u003e\u003ca href=\"#배열과-반복문\"\u003e배열과 반복문\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e자바스크립트에서 배열은 아래와 같이 선언할 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e arr \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위와 같이 선언하면 비어있는 배열 하나가 생성된 것이다. 그런데 여기서 자바와 다른 점이 존재한다. 자바같은 경우 배열이 한번 정해지면 그 사이즈를 변경할 수 없다. 하지만, 자바스크립트는 중간의 사이즈를 변경할 수 있다. 마치 자바의 컬렉션의 \u003ccode\u003eArrayList\u003c/code\u003e와 같은것과 생각하면 된다. 그럼 위에서 선언한 배열에 값을 넣으려면 어떻게 해야할까? 바로 아래와 같이 작성하면 된다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003earr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003epush\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e10\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003earr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003epush\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e20\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003earr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003epush\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e30\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/09.png\" loading=\"lazy\" decoding=\"async\" alt=\"image09\"\u003e\u003c/p\u003e\n\u003cp\u003e여기서 유심히 볼만한 부분은 \u003ccode\u003epush\u003c/code\u003e 함수는 반환 값이 \u003ccode\u003eundefined\u003c/code\u003e가 아닌 해당 배열의 사이즈를 반환한다라는 것을 볼 수 있다. 그러면 배열을 출력해보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003earr\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// [10, 20, 30]\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e주석에 달아논 것처럼 출력이 이쁘게 잘 되는 것을 볼 수 있을 것이다. 또한, 몇번째 인덱스에 어떤 값이 들어가는지도 확인이 된다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/10.png\" loading=\"lazy\" decoding=\"async\" alt=\"image10\"\u003e\u003c/p\u003e\n\u003cp\u003e자바스크립트도 자바처럼 배열의 몇번째 인덱스에 접근하는 것은 같다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003earr\u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// 20\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그리고 배열의 길이를 알 고 싶을 때는 \u003ccode\u003elength\u003c/code\u003e를 이용하면 배열의 길이를 알 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003earr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token property-access\"\u003elength\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// 3\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e또한, 배열을 자를 수도 있다. 아래와 같이 \u003ccode\u003esplice\u003c/code\u003e를 사용하면 되는데 첫번째 인자로는 짜르기 시작할 인덱스 위치고 2번째 인자로는 몇개를 짜를지를 적어주면 된다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003earr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003esplice\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e \u003cspan class=\"token comment\"\u003e// [20]\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이렇게 하면 1번째 인덱스가 잘려나가고 기존 배열에는 \u003ccode\u003e[10, 30]\u003c/code\u003e이 남을 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/11.png\" loading=\"lazy\" decoding=\"async\" alt=\"image11\"\u003e\u003c/p\u003e\n\u003cp\u003e다음으로 배열과 반복문 조합을 알아보도록 하겠다. 아래와 같이 배열을 정의하고 반복문을 돌려보자. 반복문의 문법은 자바와 거의 동일하다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e arr \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e2\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e3\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e4\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e5\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\u003cspan class=\"token keyword control-flow\"\u003efor\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e i \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token number\"\u003e0\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e i \u003cspan class=\"token operator\"\u003e\u0026#x3C;\u003c/span\u003e arr\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token property-access\"\u003elength\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e i\u003cspan class=\"token operator\"\u003e++\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003earr\u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003ei\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이렇게 하면 배열을 순회하면서 해당 인덱스에 맞는 원소가 하나씩 출력이 될 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/12.png\" loading=\"lazy\" decoding=\"async\" alt=\"image12\"\u003e\u003c/p\u003e\n\u003ch3 id=\"함수\"\u003e\u003ca href=\"#함수\"\u003e함수\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로 자바스크립트의 함수를 선언하는 방식에 대해 알아보자. 자바스크립트에서 함수를 선언하는 방법은 \u003ccode\u003efunction\u003c/code\u003e 키워드를 이용하면 된다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e \u003cspan class=\"token function\"\u003eaddTwoNumber\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token parameter\"\u003eone\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e two\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token keyword control-flow\"\u003ereturn\u003c/span\u003e one \u003cspan class=\"token operator\"\u003e+\u003c/span\u003e two\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위의 함수는 두 인자를 받아서 더하는 것을 반환하는 함수이다. 이제 실제 호출을 해보자. 호출하는 방법은 직접 함수 시그니쳐를 적어서 호출이 가능하고 함수를 변수에 할당할 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e result \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token function\"\u003eaddTwoNumber\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e3\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e5\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/13.png\" loading=\"lazy\" decoding=\"async\" alt=\"image13\"\u003e\u003c/p\u003e\n\u003cp\u003e또한 자바스크립트는 함수를 마치 변수처럼 취급할 수 있다. 마치 자바의 람다처럼 활용할 수 있다라는 것이다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e \u003cspan class=\"token function-variable function\"\u003eaddTwoNumber\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token parameter\"\u003eone\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e two\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token arrow operator\"\u003e=\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token keyword control-flow\"\u003ereturn\u003c/span\u003e one \u003cspan class=\"token operator\"\u003e+\u003c/span\u003e two\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이를 실행하면 아래와 같이 나오는 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/14.png\" loading=\"lazy\" decoding=\"async\" alt=\"image14\"\u003e\u003c/p\u003e\n\u003cp\u003e이처럼 자바스크립트는 함수를 변수처럼 사용할 수 있다. 이를 이용하면 함수를 파라미터에 넣는 행위도 가능해진다. 아래의 코드를 입력해보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e \u003cspan class=\"token function-variable function\"\u003ewrapperFunction\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token parameter\"\u003efunc\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token arrow operator\"\u003e=\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e result \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token function\"\u003efunc\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token number\"\u003e10\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e20\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eresult\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그리고 아래와 같이 호출을 하는데 \u003ccode\u003eaddTwoNumber\u003c/code\u003e를 마치 변수처럼 넘겨주면 실행이 잘 되는 것을 볼 수 있다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token function\"\u003ewrapperFunction\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eaddTwoNumber\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/15.png\" loading=\"lazy\" decoding=\"async\" alt=\"image15\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 세부동작을 살펴보자. wrapperFunction을 호출할 때 인자로 함수를 넣어줬다. 그러면 그 함수는 내부에 func를 호출하는 부분에서 call이 된다. 이처럼 자바스크립트는 자바와 다르게 함수를 1급시민으로 간주한다. 간단히 말하면 변수처럼 함수를 쓸 수 있다라고 생각하면 좋을 것 같다.\u003c/p\u003e\n\u003ch2 id=\"json\"\u003e\u003ca href=\"#json\"\u003eJSON\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJSON은 Javascript Object Notation의 약자로 쉽게 말해 자바스크립트 객체 표기법을 의미하는 것이다. 그런데 여기서 주목할 점은 표기법이라는 점이다. 즉, \u003cstrong\u003e자바스크립트에서 객체를 표기하는 방법을 빌려온 것이지 분명 자바스크립트 객체와는 다르다는 점\u003c/strong\u003e이다. JSON은 서로 다른 언어로 작성된 애플리케이션 사이에 데이터를 전송하기 위한 일종의 표준처럼 사용되고 있다. JSON과 보통 비교되는 대상은 XML인데 XML은 무겁다는 단점도 있고 요즘은 잘 사용하지 않으니 설명은 생략하겠다.\u003c/p\u003e\n\u003cpre class=\"language-json\"\u003e\u003ccode class=\"language-json code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token property\"\u003e\"name\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"양성빈\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    \u003cspan class=\"token property\"\u003e\"age\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e30\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token property\"\u003e\"address\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"서울시 강남구\"\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eJSON 문법을 보면 위와 같이 되어 있다. JSON은 key와 value로 나뉜다. 위의 코드를 보면 name이라는 key와 \"양성빈\"이라는 value가 묶여 있듯이 말이다. 즉, key와 value가 쌍으로 존재한다라는 것이다. 그리고 key와 value 사이에는 콜론이 위치하고 그리고 하나의 key와 value 쌍 사이에는 ,로 나눠주고 있다. 이런 이유로 마지막 key와 value에는 ,가 없다.\u003c/p\u003e\n\u003cp\u003e또한, key에는 문자열 형태만 올 수 있고 값에는 문자열이나 숫자 혹은 다른 값들이 올 수 있다. 그리고 몇가지 문법적 특징이 있는데 이건 더 복잡한 JSON 예제를 보면서 이야기 해보도록 해보자.\u003c/p\u003e\n\u003cpre class=\"language-json\"\u003e\u003ccode class=\"language-json code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token property\"\u003e\"firstName\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Yang\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    \u003cspan class=\"token property\"\u003e\"lastName\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Sungbin\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token property\"\u003e\"isAlive\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token boolean\"\u003etrue\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e    \u003cspan class=\"token property\"\u003e\"age\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e30\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e    \u003cspan class=\"token property\"\u003e\"height\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e175.4\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003e    \u003cspan class=\"token property\"\u003e\"address\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/sp ion\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"15\"\u003e            \u003cspan class=\"token property\"\u003e\"type\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"home\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"16\"\u003e            \u003cspan class=\"token property\"\u003e\"number\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"212 555-1234\"\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"17\"\u003e        \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"18\"\u003e        \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"19\"\u003e            \u003cspan class=\"token property\"\u003e\"type\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"office\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"20\"\u003e            \u003cspan class=\"token property\"\u003e\"number\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"646 555-4567\"\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"21\"\u003e        \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"22\"\u003e    \u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"23\"\u003e    \u003cspan class=\"token property\"\u003e\"children\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"24\"\u003e    \u003cspan class=\"token property\"\u003e\"lootoNumbers\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e3\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e6\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e11\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e32\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e37\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e42\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"25\"\u003e    \u003cspan class=\"token property\"\u003e\"spouse\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token null keyword\"\u003enull\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"26\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위의 JSON 예시에서는 앞서 살펴본 예시보다 복잡하다. 여기서는 앞에서 설명 안한 문법적인 특징들이 몇가지 존재한다. 위의 isAlive라는 key를 보면 value값으로 문자열도 아니고 숫자도 아닌 boolean형 값이 있다. JSON에서는 value값으로 boolean형 값도 가능하다. 또한 숫자에서 정수형과 실수형 모두 가능하고 또한, JSON의 값으로 또 다른 JSON을 포함하는게 가능하다. 또한 배열도 값으로 가질 수 있다. 또한 spouse라는 key에 value값으로 null이 나오고 있는데 값으로 null도 가능하다.\u003c/p\u003e\n\u003cp\u003e그러면 이런 JSON의 문법적 특징을 외워야 할까? 전혀 외울 필요는 없다고 생각한다. 그냥 눈으로 보면서 익숙해지는게 좋을 것이다.\u003c/p\u003e\n\u003ch3 id=\"자바스크립트로-json-다루기\"\u003e\u003ca href=\"#자바스크립트로-json-다루기\"\u003e자바스크립트로 JSON 다루기\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e이제 자바스크립트의 객체와 JSON이 서로 다르다는 것을 확인해보자. 이걸 확인하려면 둘 사이에 각각 변환을 해보면 된다. Javascript의 객체를 JSON 문자열로도 바꿔보고 그리고 JSON 문자열을 Javascript 객체로도 변경해보면 뭐가 다른지 한 눈에 알 수 있을 것이다. 여기서 용어를 알고 넘어가면 좋을 것 같은데 Javascript의 객체를 JSON으로 만드는 행위를 \u003cstrong\u003e직렬화\u003c/strong\u003e라고 표현한다. 자바스크립트 객체를 전송하기 위해서는 이런 직렬화 과정이 필요하다. 여기에서 \u003ccode\u003eJSON.stringify\u003c/code\u003e라는 함수가 사용된다. 이 함수를 사용하면 자바스크립트 객체를 JSON으로 변환해준다. 그리고 반대 과정을 하는 것을 \u003cstrong\u003e역직렬화\u003c/strong\u003e라고 표현한다. 이 과정에서는 \u003ccode\u003eJSON.parse\u003c/code\u003e라는 함수가 사용된다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e📝 용어 정리\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e직렬화: 특정 프로그래밍 언어의 객체를 메모리에서 파일이나 네트워크등 다른 곳으로 전송하기 위해 데이터를 변환하는 것을 말한다.\u003c/li\u003e\n\u003cli\u003e역직렬화: 직렬화의 반대 과정\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e우리가 이후 Ajax로 데이터를 주고 받을 때 이 직렬화, 역직렬화 과정이 필요하기 때문에 반드시 알고 있어야 한다. 그럼 이제 실습을 해보자. 먼저 자바스크립트의 객체를 만드는 과정을 살펴보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e obj \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token literal-property property\"\u003ename\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"양성빈\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e    \u003cspan class=\"token literal-property property\"\u003eage\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e30\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e자바스크립트 객체를 만들때 JSON과 달리 key값은 문자열로 안 하고 그 값을 그대로 작성해줘도 좋다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/16.png\" loading=\"lazy\" decoding=\"async\" alt=\"image16\"\u003e\u003c/p\u003e\n\u003cp\u003e그럼 선언한 자바스크립트 객체를 JSON으로 직렬화해보겠다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token known-class-name class-name\"\u003eJSON\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003estringify\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eobj\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e이렇게 하면 아래와 같이 잘 변환된 것을 알 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/17.png\" loading=\"lazy\" decoding=\"async\" alt=\"image17\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 이제 다시 역직렬화를 통해 다시 JSON 문자열을 자바스크립트 객체로 변경해보자.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003elet\u003c/span\u003e json \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token known-class-name class-name\"\u003eJSON\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003estringify\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eobj\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\u003cspan class=\"token known-class-name class-name\"\u003eJSON\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003eparse\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003ejson\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위와 같이 작성하면 역직렬화가 된 것을 알 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/18.png\" loading=\"lazy\" decoding=\"async\" alt=\"image18\"\u003e\u003c/p\u003e\n\u003ch2 id=\"xhr을-활용한-ajax-요청-보내기\"\u003e\u003ca href=\"#xhr을-활용한-ajax-요청-보내기\"\u003eXHR을 활용한 AJAX 요청 보내기\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e다음으로 XHR을 이용해서 AJAX 요청을 보내는 방법에 대해 알아보자. 우리가 만든 API 서버와 상호작용하는 부분이니 자세히 살펴보도록 하겠다. 일단 용어부터 살펴보면 좋을 것 같다. \"XHR을 활용한~\"이라는 문구에서 XHR은 뭔가 일종의 도구처럼 느껴지고 XHR이라는 도구를 이용해서 AJAX 요청을 보낼 수 있다라는 의미처럼 느껴진다.\u003c/p\u003e\n\u003cp\u003eXHR은 자바스크립트에서 Ajax 요청을 보낼 수 있도록 제공해주는 내장 객체이다. 여기서 내장 객체라는 말은 기본 라이브러리라고 보면 좋을 것 같다. 그러면 XHR과 Ajax는 무엇의 줄임말인지 알아보자. XHR은 XMLHttpRequest의 줄임말이고 Ajax는 Asynchronous Javascript and XML의 줄임말이다. 여기서 보면 둘다 XML이라는 용어가 보이는 것을 알 수 있다. 원래 이 XHR과 Ajax가 처음 정의되었을 때는 데이터 전송 포맷으로 XML이 주로 사용되었다. 따라서 여기 이름에 각각 XML이라는 말이 들어가져 있으나 현재에는 XML보다는 JSON을 주로 전송하고 있다.\u003c/p\u003e\n\u003cp\u003e아무튼 XHR은 XML을 포함한 Http 요청을 보낼 수 있는 객체라는 의미인데 Ajax는 무슨 의미일까? 여기서 Asynchronous라는 말은 비동기라는 의미이기에 직역하면 비동기 자바스크립트와 XML이라는 의미가 된다. 여기서 핵심적인 단어는 이 비동기라는 말이다. Ajax에서의 비동기는 여러가지 의미를 가지고 있는데 Ajax 요청이 완료되기 전까지 Javascript 코드가 대기 중인 상태가 아니라 완료되면 실행될 수 있는 로직을 지정하는 부분이 있는데 바로 이 부분이 비동기적 특성을 가지고 있다.\u003c/p\u003e\n\u003cp\u003e아무튼 Ajax를 사용하면 웹 페이지를 새로고침 없이 서버에서 데이터를 가져와서 화면을 갱신해줄 수 있다. 이를 통해 더 나은 사용자 경험을 제공해줄 수 있는 것이다. 이제 본격적으로 실습을 해보자.\u003c/p\u003e\n\u003cp\u003e먼저 서버쪽의 RestController를 만들어보자.\u003c/p\u003e\n\u003cpre class=\"language-kotlin\"\u003e\u003ccode class=\"language-kotlin code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003epackage\u003c/span\u003e me\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003esungbin\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003econtroller\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\u003cspan class=\"token keyword\"\u003eimport\u003c/span\u003e org\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003espringframework\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eweb\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003ebind\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eannotation\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eGetMapping\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e\u003cspan class=\"token keyword\"\u003eimport\u003c/span\u003e org\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003espringframework\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eweb\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003ebind\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eannotation\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eRestController\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e\u003cspan class=\"token annotation builtin\"\u003e@RestController\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003e\u003cspan class=\"token keyword\"\u003eclass\u003c/span\u003e NoParameterAjaxRestController \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"8\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"9\"\u003e    \u003cspan class=\"token annotation builtin\"\u003e@GetMapping\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"/get-with-no-parameter\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"10\"\u003e    \u003cspan class=\"token keyword\"\u003efun\u003c/span\u003e \u003cspan class=\"token function\"\u003egetWithNoParameter\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e String \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"11\"\u003e        \u003cspan class=\"token keyword\"\u003ereturn\u003c/span\u003e \u003cspan class=\"token string-literal singleline\"\u003e\u003cspan class=\"token string\"\u003e\"파라미터가 없는 GET 요청\"\u003c/span\u003e\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"12\"\u003e    \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\ n class=\"code-line line-number\" line=\"12\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"13\"\u003e\u003cspan class=\"token constant\"\u003eAJAX_REQUEST\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token property-access\"\u003eonreadystatechange\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e onReadyStateChange\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"14\"\u003e\u003cspan class=\"token constant\"\u003eAJAX_REQUEST\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003eopen\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'GET'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token string\"\u003e'/get-with-no-parameter'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"15\"\u003e\u003cspan class=\"token constant\"\u003eAJAX_REQUEST\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003esend\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e그러면 한번 코드를 살펴보도록 하겠다. restController로 ajax요청을 받을 수 있게 정의를 해두었다. 그런데 사실 ajax 요청을 받을 수 있는 컨트롤러가 존재하는 것은 아니다. 그냥 일반적인 컨트롤러이다. \u003ccode\u003e/get-with-no-parameter\u003c/code\u003e로 GET 요청을 보냈을 때 \"파라미터가 없는 GET 요청\"이라는 응답이 나가도록 설계가 되었다.\u003c/p\u003e\n\u003cp\u003e다음으로 js코드를 살펴보도록 하겠다. js코드를 보면 먼저 함수 하나가 선언되어 있다. onReadyStateChange라는 함수가 하나 선언되어 있다. 그리고 아래쪽으로 가보면 AJAX_REQUEST라는 상수가 하나 선언되어 있다. 그리고 그 상수에 XMLHttpRequest 즉, XHR 객체를 \u003ccode\u003enew\u003c/code\u003e라는 연산자로 객체를 생성하여 넣어주고 있다. 그리고 아래쪽을 보면 AJAX_REQUEST.onreadystatechange라는 변수가 있는데 해당 변수에 함수를 넣어주고 있다. 여기서 onreadystatechange라는 변수는 특별한 의미를 가지고 있는데 이 ajax request 즉, XMLHttpRequest에 readyState라는 상태 값이 있는데 이 XHR 객체가 어떤 상태인지 예를 들면, Ajax 요청을 시도 했는지, 이 Ajax 요청에 대한 응답이 왔는지, 이런 것들을 기록을 하는 상태 값이다. 해당 상태 값에 변화가 생겼을 때 여기 있는 onreadystatechange라는 곳에 등록된 함수가 실행이 될 준비를 하는 것이다.\u003c/p\u003e\n\u003cp\u003e그리고 그 다음 줄을 보면 \u003ccode\u003eAJAX_REQUEST.open\u003c/code\u003e을 통해서 GET 방식으로 해당 URL에 요청을 보내겠다라고 준비를 하는 단계이다. 그리고 실제 요청을 보내는 것은 \u003ccode\u003eAJAX_REQUEST.send()\u003c/code\u003e 함수를 호출할 때 비로소 Ajax 요청을 보내는 것이다. 그제서야 우리가 선언했던 함수가 실행이 되는 것이다. 그리고 readyState같은 경우 요청이 완료가 될 때까지 총 4번의 과정을 거친다. 그런데 우리가 관심을 가지는 부분은 4번이 바뀌는 동안에 요청이 완료된 상태만 관심을 가지기 때문에 우리가 정의한 함수에 \u003ccode\u003eAJAX_REQUEST.readyState === XMLHttpRequest.DONE\u003c/code\u003e와 같이 조건문을 작성해준 것이다. 그러면 실제 실행을 해보면 아래와 같이 우리가 작성한 API와 html, js코드가 잘 나오는 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/19.png\" loading=\"lazy\" decoding=\"async\" alt=\"image19\"\u003e\u003c/p\u003e\n\u003cp\u003e위와 같이 로그가 찍힌 것도 잘 볼 수가 있으며, 네트워크 탭을 통해 아래처럼 응답이 잘 간 것도 확인 할 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/20.png\" loading=\"lazy\" decoding=\"async\" alt=\"image20\"\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/21.png\" loading=\"lazy\" decoding=\"async\" alt=\"image21\"\u003e\u003c/p\u003e\n\u003cp\u003e여기서 네트워크 탭에서 우리가 만든 API가 xhr방식으로 잘 전송 된 것도 확인 할 수 있다. 즉, ajax로 잘 날라갔다는 것이 확인 되는 것이다.\u003c/p\u003e\n\u003cp\u003e그러면 이제 조금 더 복잡한 예제를 들어보겠다.\u003c/p\u003e\n\u003cpre class=\"language-kotlin\"\u003e\u003ccode class=\"language-kotlin code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token key ne=\"52\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"53\"\u003e    ajaxRequest\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token property-access\"\u003eonreadystatechange\u003c/span\u003e \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e onReadyStateChange\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"54\"\u003e    ajaxRequest\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003eopen\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token string\"\u003e'GET'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token string\"\u003e'/bookmarks'\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"55\"\u003e    ajaxRequest\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003esend\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"56\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e코드를 그러면 살펴보자. 등록 API부터 보자. 다른건 이전이랑 비슷한데 여기서 핵심은 \u003ccode\u003e@RequestBody\u003c/code\u003e로 Bookmark 객체를 받는 다는 것을 알 수 있다. 이 부분이 Ajax 요청의 body에 json으로 이 bookmark에 대한 body를 받는 것이다. 조회 API는 이전과 동일하니 설명을 생략하겠다.\u003c/p\u003e\n\u003cp\u003e다음으로 프론트 코드에 대해서 살펴보자. 프론트 코드를 보면 form 태그가 존재한다. 그리고 form 태그 안에 input 태그들이 존재한다. 해당 input 태그는 UI로 보면 알겠지만 사용자가 무언가를 입력하는 창을 보여주는 태그이다. 그리고 그 input 태그들에 name 속성으로 이름을 지정해준 것을 볼 수 있는데 해당 이름이, 등록 API의 request body로 들어가는 네이밍들과 일치하는 것을 알 수 있다. 또한, 마지막 input 태그를 보면 type이 submit으로 되어 있는 것을 볼 수 있는데 이것은 서버로 무언가 데이터를 보낼 때 자주 사용되는 타입이다. 정확히는 input의 type이 submit으로 태그를 생성하면 브라우저에 제출 버튼이 생성되고 해당 버튼을 클릭하면 input의 부모 태그인 form 태그의 onsubmit 속성의 값이 자바스크립트로 실행이 된다. 또한, onsubmit 속성의 value 값을 보면 \u003ccode\u003ereturn\u003c/code\u003e 키워드가 나와 있는데 이 부분은 이후에 설명해보도록 하겠다.\u003c/p\u003e\n\u003cp\u003e그러면 자바스크립트 코드를 보자 \u003ccode\u003eaddBookmarkRequest\u003c/code\u003e 함수를 보면 \u003ccode\u003equerySelector\u003c/code\u003e로 무언가를 가져오는게 있는데 이 부분은 css때 설명을 하겠지만 지금 잠깐 설명을 해보자면 \u003ccode\u003equerySelector\u003c/code\u003e는 HTML의 특정 태그를 가져올 수 있다라고 보면 좋을 것이다. 지금은 input 태그의 name 속성의 값이 있는 것들을 가져오고 있는 것을 볼 수 있다. 정확히는 input 태그의 사용자가 입력한 value 값을 가져오는 것이다. 이유는 \u003ccode\u003e.value\u003c/code\u003e라는 것 때문이다. 다음으로 코드를 보면 자바스크립트 object로 만들고 이것을 JSON으로 직렬화를 한다. 이후는 이전에 살펴본 것과 유사하니 자세한 설명은 생략하겠다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e✅ 참고\u003c/p\u003e\n\u003cp\u003epost 메서드로 데이터를 전달할 때 header에 Content-Type: application/json으로 넣어줘야 한다. ajax에서는 \u003ccode\u003esetRequestHeader\u003c/code\u003e로 지정해주면 된다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e다음으로 보면 button 태그가 있는데 해당 태그를 보면 \u003ccode\u003eonclick\u003c/code\u003e 속성이 있다. 이 속성은 해당 버튼을 클릭할 때 호출되는 자바스크립트 코드를 지정할 수 있다. 그리고 자바스크립트 코드를 보면 \u003ccode\u003eevent.currentTarget\u003c/code\u003e을 볼 수 있는데 이것은 지금은 굳이 필요 없을 수 있겠으나 만약 여러 XHR 객체를 쓸 수도 있다. 그러면 뭔가 꼬일 수도 있기에 보통은 해당 함수를 호출하는 target정보로 이용하는게 좋다. 즉, 해당 함수를 호출하는 target정보의 readyState값이 DONE이고 상태가 200일 때 id가 bookmark-list인 태그를 찾아서 해당 태그의 자식 태그들을 전부 비워주고 응답 값들을 받아와서 해당 응답 값들을 li 태그를 생성하여 넣어주는 행위를 하고 있다. 여기서 몇가지 함수와 속성에 대해 알아볼건데 먼저 \u003ccode\u003einnerHTML\u003c/code\u003e은 해당 태그의 HTML 태그들을 넣어주는 역할인데 뒤에서 나오는 \u003ccode\u003eappendChild\u003c/code\u003e와 기능이 유사하다. \u003ccode\u003ecreateElement\u003c/code\u003e가 HTML 태그들을 생성해주는 자바스크립트 내장 함수이며, \u003ccode\u003ecreateTextNode\u003c/code\u003e를 통해 텍스트 \"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eevent\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token comment\"\u003e// AJAX 요청 로직\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e    \u003cspan class=\"token keyword control-flow\"\u003ereturn\u003c/span\u003e \u003cspan class=\"token boolean\"\u003efalse\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e위의 프론트 코드가 있다고 가정하자. 먼저 html 코드부터 확인해보자. 먼저 form 태그가 존재하고 그 form 태그 안에 label과 input 태그가 존재한다. 이 input 태그에서 유효성 검사를 진행할 수 있는데 위의 코드를 보면 \u003ccode\u003eminlength\u003c/code\u003e, \u003ccode\u003emaxlength\u003c/code\u003e, \u003ccode\u003erequired\u003c/code\u003e, \u003ccode\u003emin\u003c/code\u003e, \u003ccode\u003emax\u003c/code\u003e등이 존재한다.\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003eminlength\u003c/code\u003e는 해당 입력 폼에 최소 길이를 설정해줄 수 있다. \u003ccode\u003emaxlength\u003c/code\u003e는 해당 입력 폼에 최대 길이를 설정해 줄 수 있다. 이 속성을 이용하면 입력 폼의 길이의 제약을 줄 수 있다. 그리고 \u003ccode\u003erequired\u003c/code\u003e를 이용하면 해당 input이 반드시 입력이 되어야 한다라고 설정할 수 있다.\u003c/p\u003e\n\u003cp\u003e다음 input을 보면 이번엔 type이 number로 되어 있는 것을 볼 수 있다. 이렇게 \u003ccode\u003etype\u003c/code\u003e을 number로 설정하면 숫자만 들어 올 수 있다. 이렇게 type이 number로 지정을 하면 \u003ccode\u003emin\u003c/code\u003e이나 \u003ccode\u003emax\u003c/code\u003e같은 속성을 쓸 수 있는데 \u003ccode\u003emin\u003c/code\u003e은 입력하는 값의 최소 값이고 \u003ccode\u003emax\u003c/code\u003e는 입력하는 값의 최대 값을 지정할 수 있는 것이다.\u003c/p\u003e\n\u003cp\u003e다음 input을 보면 type이 url로 되어 있는 것을 볼 수 있다. 이렇게 \u003ccode\u003etype\u003c/code\u003e을 url로 설정을 하면 입력 값이 문자열인데 url형식인지 유효성 검사를 해줄 수 있다.\u003c/p\u003e\n\u003cp\u003e다음 input을 보면 type이 submit인데 앞에서 살펴봤듯이 해당 태그를 설정하면 제출 버튼이 나오고 그 버튼을 클릭했을 때 form 태그의 onsubmit의 자바스크립트 코드를 실행 시켜 준다. 실행 화면은 아래와 같다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/25.png\" loading=\"lazy\" decoding=\"async\" alt=\"image25\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 여기서 좀 더 살펴 볼 부분이 있다. 바로 form 태그의 \u003ccode\u003eonsubmit\u003c/code\u003e의 \u003ccode\u003ereturn onSubmit();\u003c/code\u003e 부분의 \u003ccode\u003ereturn\u003c/code\u003e부분이다. 여기에는 왜 \u003ccode\u003ereturn\u003c/code\u003e을 넣어줬을까? 그걸 알기 위해서 한번 \u003ccode\u003ereturn false\u003c/code\u003e하는 부분을 \u003ccode\u003ereturn true\u003c/code\u003e로 변경해보자. 즉, js 코드처럼 작성해보자는 의미이다.\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js code-highlight\"\u003e\u003cspan class=\"code-line line-number\" line=\"1\"\u003e\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e \u003cspan class=\"token function\"\u003eonSubmit\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token parameter\"\u003eevent\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"2\"\u003e    \u003cspan class=\"token console class-name\"\u003econsole\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003elog\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eevent\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"3\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"4\"\u003e    \u003cspan class=\"token comment\"\u003e// AJAX 요청 로직\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"5\"\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"6\"\u003e    \u003cspan class=\"token keyword control-flow\"\u003ereturn\u003c/span\u003e \u003cspan class=\"token boolean\"\u003etrue\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/span\u003e\u003cspan class=\"code-line line-number\" line=\"7\"\u003e\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003e실제 바꿔서 해본 독자는 알겠지만 입력했던 값들이 전부 없어진 것을 알 수 있을 것이다. 그리고 뭔가 url도 바뀌고 네트워크 탭을 보면 뭔가 나온 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/Javascript/assets/26.png\" loading=\"lazy\" decoding=\"async\" alt=\"image26\"\u003e\u003c/p\u003e\n\u003cp\u003eurl을 자세히 보면 기존 url에 우리가 입력했던 값들이 쿼리스트링으로 붙어나간 것을 볼 수 있다. 그러면 왜 이런 일이 발생했을까? 그것을 알기 위해서는 해당 폼에 \u003ccode\u003eonSubmit\u003c/code\u003e 이벤트 핸들러가 어떤 식으로 동작을 하는지 이해할 필요가 있다. 해당 \u003ccode\u003eonSubmit\u003c/code\u003e 이벤트 핸들러 같은 경우 \u003ccode\u003ereturn onSubmit()\u003c/code\u003e으로 호출을 해주는데 이때 이 결과가 \u003ccode\u003ereturn true\u003c/code\u003e이면 form의 정의된 행동, 즉 웹 페이지에 제출하면서 웹 페이지가 이동하려는 것을 하려고 한다. 그런데 우리는 여기서 ajax 요청을 하려고 하는데 즉, 페이지를 새로고침하지 않고 서버로 요청을 보내려고 하는 것이다. 그렇기 때문에 우리는 원래 form 태그가 정의한 html의 기능을 차단시켜야 한다. 그래서 우리는 return값을 \u003ccode\u003efalse\u003c/code\u003e로 지정해줌으로서 폼 자체가 제출되지 않게 하고 오직 ajax로만 제출하게 하는 것이다.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"[프론트엔드] Javascript\",\"date\":\"Tue Nov 11 2025 20:17:27 GMT+0000 (Coordinated Universal Time)\",\"tags\":\"$0:f:0:1:1:props:children:1:props:children:1:props:children:0:props:posts:67:tags\",\"image\":\"/content/posts/Javascript/assets/banner.png\",\"series\":\"프론트엔드\",\"timeToRead\":18,\"html\":\"$1a\"},\"author\":\"Sungbin\",\"seriesPosts\":[{\"name\":\"[프론트엔드] 백엔드 개발자에 의한, 백엔드 개발자를 위한 프론트엔드\",\"timeToRead\":3,\"slug\":\"/백엔드-개발자에-의한-백엔드-개발자를-위한-프론트엔드/\"},{\"name\":\"[프론트엔드] 프론트엔드에 대해\",\"timeToRead\":6,\"slug\":\"/프론트엔드에-대해/\"},{\"name\":\"[프론트엔드] HTML\",\"timeToRead\":10,\"slug\":\"/HTML/\"},{\"name\":\"[프론트엔드] Javascript\",\"timeToRead\":18,\"slug\":\"/Javascript/\"},{\"name\":\"[프론트엔드] css\",\"timeToRead\":8,\"slug\":\"/css/\"}]}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[6245,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"[프론트엔드] Javascript · Sungbin\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"양성빈의 블로그\"}],[\"$\",\"meta\",\"2\",{\"name\":\"google-site-verification\",\"content\":\"1PmwbFiy4YMimCQ6EmhZyUp2c7m23NNnr5NQRRXwQzM\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:title\",\"content\":\"[프론트엔드] Javascript\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:description\",\"content\":\"양성빈의 블로그\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:image\",\"content\":\"https://sungbin.kr/content/posts/Javascript/assets/banner.png\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:title\",\"content\":\"[프론트엔드] Javascript\"}]

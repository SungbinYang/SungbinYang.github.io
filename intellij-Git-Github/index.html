/h2\u003e\n\u003cp\u003e인텔리제이에서 Git을 사용하는 방법에 대해 살펴보도록 하자.\u003c/p\u003e\n\u003ch3 id=\"git-view-on\"\u003e\u003ca href=\"#git-view-on\"\u003eGit View On\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e먼저, Git에 대한 기본적인 기능들이 있는 UI를 어떻게 볼 수 있는지 살펴보도록 하자. 그것을 우리는 Git View On이라고 한다. 인텔리제이 상단에 \u003ccode\u003eView\u003c/code\u003e탭에 들어가서 \u003ccode\u003eTop Window\u003c/code\u003e를 클릭하면 여러가지 기능들이 있는 메뉴바가 나오는데 여기서 Git을 선택하거나 혹은 단축키로 맥 기준 \u003ccode\u003ecommand + 9\u003c/code\u003e를 클릭하면 아래와 같이 Git 터미널 창같은 것이 나온다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/01.png\" loading=\"lazy\" decoding=\"async\" alt=\"image01\"\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/02.png\" loading=\"lazy\" decoding=\"async\" alt=\"image02\"\u003e\u003c/p\u003e\n\u003cp\u003e위의 화면을 보면 다양한 기능들을 제공해주는데 먼저 로컬 저장소의 브랜치와 원격 저장소의 브랜치 목록을 볼 수 있으며 git graph처럼 그래프도 이쁘게 보여준다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/03.png\" loading=\"lazy\" decoding=\"async\" alt=\"image03\"\u003e\u003c/p\u003e\n\u003cp\u003e또한, 뭔가 로컬 저장소에 변화가 생기면 왼쪽 탭의 깃 관련 버튼을 누르면 위와 같이 저장소에 대한 변화도 한번에 확인이 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/04.png\" loading=\"lazy\" decoding=\"async\" alt=\"image04\"\u003e\u003c/p\u003e\n\u003cp\u003e이런 로컬 저장소 변화 탭에서 파일 하나를 오른쪽 마우스 클릭을 하면 여러가지 기능을 할 수 있는데 여기서 \u003ccode\u003eshow diff\u003c/code\u003e를 클릭하면 아래와 같이 변경점을 UI상으로 확인이 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/05.png\" loading=\"lazy\" decoding=\"async\" alt=\"image05\"\u003e\u003c/p\u003e\n\u003cp\u003e또한, Git Graph에 커밋 하나를 클릭하면 왼쪽 창에 해당 커밋에 어떤 파일이 변경이 되었고 누가 작업을 했으며 해당 커밋에 대한 정보가 상세하게 잘 나온다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/06.png\" loading=\"lazy\" decoding=\"async\" alt=\"image06\"\u003e\u003c/p\u003e\n\u003cp\u003e또한, 해당 커밋에 대해 다양한 기능도 제공하니 한번씩 실습을 해보면 좋을 것 같다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/07.png\" loading=\"lazy\" decoding=\"async\" alt=\"image07\"\u003e\u003c/p\u003e\n\u003cp\u003e다음으로, 깃 관련 터미널에 콘솔 버튼을 눌러보자. 그러면 내가 해당 프로젝트에 어떤 작업을 했는데 git 관련 로그가 나오는 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/08.png\" loading=\"lazy\" decoding=\"async\" alt=\"image08\"\u003e\u003c/p\u003e\n\u003ch3 id=\"git-option-popup\"\u003e\u003ca href=\"#git-option-popup\"\u003eGit Option Popup\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로 Git에 대하여 보다 상세한 기능들에 대해 살펴보도록 하자. 맥 기준 \u003ccode\u003eCtrl + v\u003c/code\u003e를 입력하면 아래와 같은 팝업창이 나오고 해당 팝업 메뉴를 보면 우리가 익숙하게 사용한 Git관련 작업들이 나오는 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/09.png\" loading=\"lazy\" decoding=\"async\" alt=\"image09\"\u003e\u003c/p\u003e\n\u003ch3 id=\"git-history\"\u003e\u003ca href=\"#git-history\"\u003eGit History\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e여기서 4번째의 History를 살펴보면 해당 파일에 대한 Git에 대한 history를 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/10.png\" loading=\"lazy\" decoding=\"async\" alt=\"image10\"\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/11.png\" loading=\"lazy\" decoding=\"async\" alt=\"image11\"\u003e\u003c/p\u003e\n\u003ch3 id=\"git-branch\"\u003e\u003ca href=\"#git-branch\"\u003eGit Branch\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로 \u003ccode\u003eCtrl + v\u003c/code\u003e를 입력하고 브랜치 관련 메뉴를 클릭하면 아래와 같이 브랜치들이 쭉 나오는 것을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/12.png\" loading=\"lazy\" decoding=\"async\" alt=\"image12\"\u003e\u003c/p\u003e\n\u003cp\u003e다음으로 \u003ccode\u003eNew Branch\u003c/code\u003e를 클릭하면 새로운 브랜치를 만들 수 있다. 아래처럼 \u003ccode\u003echeckout branch\u003c/code\u003e옵션을 체크하면 브랜치를 만듬과 동시에 체크아웃이 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/13.png\" loading=\"lazy\" decoding=\"async\" alt=\"image13\"\u003e\u003c/p\u003e\n\u003cp\u003e브랜치를 만들고 나서 Git 콘솔창을 보면 정상적으로 만들어짐을 볼 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/14.png\" loading=\"lazy\" decoding=\"async\" alt=\"image14\"\u003e\u003c/p\u003e\n\u003cp\u003e이후에 \u003ccode\u003emain\u003c/code\u003e브랜치로 체크아웃을 하고 싶다면 \u003ccode\u003eCtrl + v\u003c/code\u003e를 입력 후, 브랜치 메뉴로 가서 브랜치 목록에 아래와 같이 \u003ccode\u003emain\u003c/code\u003e 브랜치를 클릭 후, 체크아웃을 진행하면 쉽게 가능하다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/15.png\" loading=\"lazy\" decoding=\"async\" alt=\"image15\"\u003e\u003c/p\u003e\n\u003ch3 id=\"commit\"\u003e\u003ca href=\"#commit\"\u003eCommit\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e다음으로 커밋을 진행해보자. 커밋을 진행하기 위해서는 \u003ccode\u003eCtrl + v\u003c/code\u003e를 통해 메뉴창을 열고 Commit을 누르면 왼쪽처럼 메뉴바가 나오지만 더 쉬운 방법으로는 \u003ccode\u003ecommand + k\u003c/code\u003e를 누르면 자동 커밋창이 열린다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/16.png\" loading=\"lazy\" decoding=\"async\" alt=\"image16\"\u003e\u003c/p\u003e\n\u003cp\u003e그리고 아래와 같이 커밋 메세지를 작성하고 \u003ccode\u003ecommit anyway and push\u003c/code\u003e 버튼을 클릭한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/17.png\" loading=\"lazy\" decoding=\"async\" alt=\"image17\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 push에 대한 팝업이 나올 것이고 push를 진행해주면 자동으로 원격저장소에 반영이 된다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/18.png\" loading=\"lazy\" decoding=\"async\" alt=\"image18\"\u003e\u003c/p\u003e\n\u003cp\u003e또한, 커밋을 진행할 때 다양한 옵션을 줄 수 있다. 인텔리제이에서는 아래와 같은 옵션을 주며 실무에서는 보통 \u003ccode\u003ereformat\u003c/code\u003e이나 \u003ccode\u003erearrange\u003c/code\u003e를 사용한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/19.png\" loading=\"lazy\" decoding=\"async\" alt=\"image19\"\u003e\u003c/p\u003e\n\u003ch3 id=\"push\"\u003e\u003ca href=\"#push\"\u003ePush\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e⚠️ 주의\u003c/p\u003e\n\u003cp\u003e여기서 주의 할 점은 파일을 생성되면 commit과 push를 동시에 진행이 안된다. 이 점은 유의해야 하며 push와 commit을 따로 진행해야 한다. push의 단축키는 맥 기준 \u003ccode\u003ecommand + shift + k\u003c/code\u003e이다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/20.png\" loading=\"lazy\" decoding=\"async\" alt=\"image20\"\u003e\u003c/p\u003e\n\u003ch3 id=\"pull\"\u003e\u003ca href=\"#pull\"\u003epull\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e우리가 실무에서 작업을 하다보면 다른 작업자들과 작업을 같이 한다. 하지만 경우에 따라 다른 사람이 작업한 것을 내려받아서 사용해야 할 때가 존재한다. 그럴 때는 우리는 \u003ccode\u003egit pull\u003c/code\u003e을 이용하고 해당 기능은 아쉽게도 단축키가 존재하지 않는다. 따라서 Action 검색을 통해 git pull이라고 검색하고 사용해야 한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/21.png\" loading=\"lazy\" decoding=\"async\" alt=\"image21\"\u003e\u003c/p\u003e\n\u003ch3 id=\"정리\"\u003e\u003ca href=\"#정리\"\u003e정리\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eGit View On\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003ecommand + 9\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eAlt + 9\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eGit Option Popup\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003eCtrl + v\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eAlt + 백틱\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eGit History\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003eCtrl + v =\u003e 4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eAlt + 백틱 =\u003e 4\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eBranch\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003eCtrl + v =\u003e 7\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eAlt + 백틱 =\u003e 7\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eCommit\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003ecommand + k\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eCtrl + k\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003ePush\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003ecommand + shift + k\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eCtrl + shift + k\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003epull\n\u003cul\u003e\n\u003cli\u003e맥: \u003ccode\u003eCtrl + shift + a =\u003e git pull\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e윈도우/리눅스: \u003ccode\u003eCtrl + shift + a =\u003e git pull\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"github-연동하기\"\u003e\u003ca href=\"#github-연동하기\"\u003eGithub 연동하기\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e그러면 만약 새로운 환경에서 인텔리제이와 내 프로젝트와 Github을 연동하는 방법에 대해 살펴보도록 하겠다.\u003c/p\u003e\n\u003ch3 id=\"기존-프로젝트-github에-연동하기\"\u003e\u003ca href=\"#기존-프로젝트-github에-연동하기\"\u003e기존 프로젝트 Github에 연동하기\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e먼저 Action 검색을 열어서 \u003ccode\u003eshare project on Github\u003c/code\u003e을 검색한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/22.png\" loading=\"lazy\" decoding=\"async\" alt=\"image22\"\u003e\u003c/p\u003e\n\u003cp\u003e그리고 연동을 진행하면 된다. 만약 이미 연동이 되어 있다면 아래와 같이 나올 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/23.png\" loading=\"lazy\" decoding=\"async\" alt=\"image23\"\u003e\u003c/p\u003e\n\u003cp\u003e필자는 독자들을 위해 어떻게 화면이 나오는지 보여주기 위해 새로운 프로젝트를 만들어서 진행해보도록 하겠다. 먼저 Action 검색을 해서 \u003ccode\u003eshare project on Github\u003c/code\u003e을 입력하면 아래와 같이 나올 것이다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/24.png\" loading=\"lazy\" decoding=\"async\" alt=\"image24\"\u003e\u003c/p\u003e\n\u003cp\u003e여기에 repository 이름과 설명을 작성하고 \u003ccode\u003eAdd Account\u003c/code\u003e 버튼을 클릭한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/25.png\" loading=\"lazy\" decoding=\"async\" alt=\"image25\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 토큰 방식과 일반 방식이 있는데 토큰 방식으로 인증을 추천하긴 한다. 하지만 간단히 하고 싶다면 일반 Id/Password를 입력하는 방식도 좋다. 독자들이 원하는 방식으로 진행하면 좋을 것 같다.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e보안 상, ssh를 이용한 방식을 적극 권한다.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e이렇게 인증을 하면 아래와 같이 나올 것이고 share 버튼을 클릭한다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/26.png\" loading=\"lazy\" decoding=\"async\" alt=\"image26\"\u003e\u003c/p\u003e\n\u003cp\u003e그러면 바로 커밋을 진행할 지 물어본다. 필자는 바로 커밋을 진행해볼려고 한다. 바로 커밋 메세지를 작성해주고 add를 눌러주면 자동으로 커밋을 진행해주고 원격 repository가 생성되고 push가 됨을 알 수 있다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/27.png\" loading=\"lazy\" decoding=\"async\" alt=\"image27\"\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/28.png\" loading=\"lazy\" decoding=\"async\" alt=\"image28\"\u003e\u003c/p\u003e\n\u003ch3 id=\"github-프로젝트-clone-받기\"\u003e\u003ca href=\"#github-프로젝트-clone-받기\"\u003eGithub 프로젝트 clone 받기\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e깃헙 프로젝트 클론 받는 법은 간단하다. 인텔리제이 창을 열어서 clone repository 버튼을 클릭한다. 그리고 url 방식으로 다운 받을지 혹은 자기 깃헙의 repo에 클론을 받을지 선택하고 클론을 진행하면 된다.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/content/posts/intellij-Git-Github/assets/29.png\" loading=\"lazy\" decoding=\"async\" alt=\"image29\"\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"[IntelliJ] Git\u0026Github\",\"date\":\"Thu Mar 26 2026 18:13:27 GMT+0000 (Coordinated Universal Time)\",\"tags\":\"$0:f:0:1:1:props:children:1:props:children:1:props:children:0:props:posts:21:tags\",\"image\":\"/content/p
